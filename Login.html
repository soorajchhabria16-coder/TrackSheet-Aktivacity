<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aktivacity — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body {
    background: #0F172A; /* Darker navy for login */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    color: #fff;
  }
  .login-wrap {
    width: 100%;
    max-width: 440px;
    background: #FFFFFF;
    color: var(--text);
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .login-hero {
    background: radial-gradient(120% 120% at 0% 0%, #6366F1 0%, #4F46E5 55%, #312E81 100%);
    padding: 40px 40px 30px;
    text-align: center;
    color: #fff;
    position: relative;
  }
  .login-hero::after {
    content: "";
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    background: #fff;
    border-radius: 50%;
  }
  .brand-lg {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .brand-lg .brand-mark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    display: grid;
    place-items:center;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .brand-lg .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .login-hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    opacity: 0.9;
  }
  .login-body {
    padding: 50px 40px 40px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    background: #F8FAFC;
    transition: all 0.2s;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
  }
  .forgot {
    display: flex;
    justify-content: flex-end;
    margin-top: -12px;
    margin-bottom: 24px;
  }
  .forgot a {
    font-size: 13px;
    color: var(--primary);
    font-weight: 600;
  }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: 0;
    border-radius: 12px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    transition: all 0.2s;
  }
  .btn-login:hover {
    background: var(--primary-600);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3);
  }
  .btn-login:active {
    transform: translateY(1px);
  }
  .login-foot {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-top: 24px;
  }
  .login-foot a {
    color: var(--text);
    font-weight: 700;
  }
  /* Decorative background */
  .bg-pattern {
    position: fixed;
    inset: 0;
    z-index: -1;
    opacity: 0.4;
    background: 
      radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(245, 158, 11, 0.1) 0%, transparent 40%);
  }
</style>
</head>
<body>
<div id="icons"></div>
<div class="bg-pattern"></div>

<div class="login-wrap">
  <header class="login-hero">
    <div class="brand-lg">
      <div class="brand-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="brand-name">Aktivacity</div>
    </div>
    <h1>Studio Login</h1>
  </header>

  <div class="login-body">
    <form onsubmit="event.preventDefault(); window.location.href='Dashboard.html'">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" value="sooraj@aktivacity.studio" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" value="••••••••" required>
      </div>
      
      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign in to workspace</button>
    </form>

    <div class="login-foot">
      Don't have an account? <a href="#">Request access</a>
    </div>
  </div>
</div>

<script>
  // Simple icon loading for the brand mark
  // (Not using external icons.html here to keep login ultra-fast)
</script>
</body>
</html>
