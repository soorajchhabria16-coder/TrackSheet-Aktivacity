<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aktivacity — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><style>
  .admin-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow-md);
  }
  .stat-card .lbl { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .val { font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  
  .audit-log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .audit-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.02);
  }
  .audit-item {
    display: flex;
    gap: 16px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    transition: background 0.1s;
  }
  .audit-item:hover { background: rgba(255, 255, 255, 0.01); }
  .audit-item:last-child { border-bottom: 0; }
  
  select {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: all 0.2s;
  }
  select:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.08); }

  .stat-val-success { color: var(--success); }
  .stat-val-warning { color: var(--warning); }
  .table-container { margin-bottom: 24px; }
  .table-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .user-item { align-items: center; }
  .user-avatar { width: 36px; height: 36px; font-size: 12px; font-weight: 700; }
  .user-info { flex: 1; min-width: 0; padding: 0 16px; }
  .user-name { font-weight: 600; color: var(--text); font-size: 14px; }
  .user-email { font-size: 12px; color: var(--muted-2); margin-top: 2px; }
  .user-dept { width: 120px; flex-shrink: 0; color: var(--muted); font-size: 13px; font-weight: 500; }
  .user-role-cell { width: 160px; flex-shrink: 0; }
  .user-status-cell { width: 100px; flex-shrink: 0; }
  .user-action-cell { width: 80px; flex-shrink: 0; text-align: right; }
  .role-badge { background: var(--primary-50); color: var(--primary); text-transform: none; letter-spacing: 0; }
  .status-indicator { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .status-indicator.pending { color: var(--warning); }
  .status-indicator.active { color: var(--success); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.pending { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
  .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .remove-btn { color: var(--danger); border-color: var(--danger-50); }

  /* Modal */
  #invite-modal {
    display:none; position:fixed; inset:0; 
    background:rgba(11, 15, 25, 0.85);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    align-items:center; justify-content:center; z-index:1000;
  }
  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 24px;
    padding: 32px;
    width: 440px;
    max-width: 90vw;
    box-shadow: var(--shadow-lg);
  }
  .modal-content h3 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; margin: 0 0 24px; color: var(--text); }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em;
  }
  .form-group input, .form-group select {
    width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; color: var(--text); font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }

  @media (max-width: 1000px) {
    .admin-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="icons"></div>

<div class="app">
  <div id="sidebar-slot"></div>
  <main class="main">
    <div id="topbar-slot"></div>
    <div class="content">
      
      <!-- Stats row -->
      <div class="admin-grid">
        <div class="stat-card">
          <div class="lbl">Total Users</div>
          <div class="val" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Active</div>
          <div class="val stat-val-success" id="stat-active">—</div>
        </div>
        <div class="stat-card">
          <div class="lbl">Pending Invite</div>
          <div class="val stat-val-warning" id="stat-pending">—</div>
        </div>
      </div>

      <!-- User table -->
      <div class="audit-log table-container">
        <div class="audit-header">
          <span class="table-title">Team Members</span>
          <button class="btn btn-primary btn-sm" onclick="openInviteModal()">
            <svg class="icon"><use href="#i-plus"/></svg> Invite User
          </button>
        </div>
        <div id="user-table-body"></div>
      </div>

    </div>
  </main>
</div>

<!-- Invite Modal -->
<div id="invite-modal">
  <div class="modal-content">
    <h3>Invite Team Member</h3>
    <div class="form-group">
      <label>Full Name</label>
      <input id="inv-name" type="text" placeholder="e.g. Zara Ali"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="inv-email" type="email" placeholder="e.g. zara@studio.com"/>
    </div>
    <div class="form-group">
      <label>Department</label>
      <input id="inv-dept" type="text" placeholder="e.g. Design"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="inv-role">
        <option value="member">Team Member</option>
        <option value="pm">Project Manager</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:24px">
      <button onclick="closeInviteModal()" class="btn btn-ghost">Cancel</button>
      <button id="inv-submit" onclick="submitInvite()" class="btn btn-primary">Send Invite</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="sidebar.js"></script>
<script>
fetch('icons.html').then(r=>r.text()).then(t=>document.getElementById('icons').innerHTML=t)
  .catch(()=>{}).finally(init);

async function init() {
  await window.authReady;
  if ((window.CURRENT_USER || {}).user_role !== 'admin') {
    window.location.href = 'Dashboard.html';
    return;
  }
  document.getElementById('sidebar-slot').outerHTML = renderSidebar('admin');
  document.getElementById('topbar-slot').outerHTML  = renderTopbar('Admin Panel', 'Manage users, roles, and access.');
  await renderUserTable();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function avatarClass(oi) {
  const classes = { SH:'sh', SB:'sb', TM:'tm', IN:'in', ZA:'za', MK:'mk' };
  return classes[oi] ? `avatar-${classes[oi]}` : '';
}

async function renderUserTable() {
  const profiles = await fetchProfiles();
  const active  = profiles.filter(p => (p.status || 'active') === 'active');
  const pending = profiles.filter(p => p.status === 'pending');

  document.getElementById('stat-total').textContent   = profiles.length;
  document.getElementById('stat-active').textContent  = active.length;
  document.getElementById('stat-pending').textContent = pending.length;

  const rlLabel = r => r === 'admin' ? 'Admin' : r === 'pm' ? 'Project Manager' : 'Member';

  document.getElementById('user-table-body').innerHTML = profiles.map(p => {
    const oi       = p.oi || (p.name || p.email || '?').split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const isSelf   = p.email === (window.CURRENT_USER || {}).email;
    const isPend   = p.status === 'pending';
    const uRole    = p.user_role || 'member';

    return `
      <div class="audit-item user-item">
        <div class="avatar user-avatar ${avatarClass(oi)}">${esc(oi)}</div>
        <div class="user-info">
          <div class="user-name">${esc(p.name || p.email)}</div>
          <div class="user-email">${esc(p.email || '')}</div>
        </div>
        <div class="user-dept">
          ${esc(p.department || '—')}
        </div>
        <div class="user-role-cell">
          ${isSelf
            ? `<span class="badge role-badge">${esc(rlLabel(uRole))}</span>`
            : `<select data-action="change-role" data-id="${esc(p.id)}" title="Change role for ${esc(p.name || p.email)}">
                <option value="admin"  ${uRole==='admin' ?'selected':''}>Admin</option>
                <option value="pm"     ${uRole==='pm'    ?'selected':''}>Project Manager</option>
                <option value="member" ${uRole==='member'?'selected':''}>Member</option>
              </select>`
          }
        </div>
        <div class="user-status-cell">
          ${isPend
            ? `<span class="status-indicator pending"><span class="status-dot pending"></span> Pending</span>`
            : `<span class="status-indicator active"><span class="status-dot active"></span> Active</span>`
          }
        </div>
        <div class="user-action-cell">
          ${isSelf ? '' : `
            <button data-action="remove-user" data-id="${esc(p.id)}" class="btn btn-ghost btn-xs remove-btn" title="${isPend ? 'Revoke invite' : 'Remove user'}">
              ${isPend ? 'Revoke' : 'Remove'}
            </button>`
          }
        </div>
      </div>`;
  }).join('');

  // Event delegation — avoids inline onclick attribute injection
  document.getElementById('user-table-body').addEventListener('change', async e => {
    const el = e.target.closest('[data-action="change-role"]');
    if (el) changeRole(el.dataset.id, el.value);
  });
  document.getElementById('user-table-body').addEventListener('click', async e => {
    const el = e.target.closest('[data-action="remove-user"]');
    if (el) removeUser(el.dataset.id);
  });
}

async function changeRole(id, newRole) {
  try {
    await window.updateProfile(id, { user_role: newRole });
    const p = (window.OWNERS || []).find(o => String(o.id) === String(id));
    if (p) p.user_role = newRole;
  } catch(e) {
    console.error('[changeRole]', e);
    alert('Could not update role. Please try again.');
    await renderUserTable();
  }
}

async function removeUser(id) {
  if (!confirm('Remove this user? They will lose access immediately.')) return;
  try {
    await window.removeUser(id);
    window.OWNERS = (window.OWNERS || []).filter(o => String(o.id) !== String(id));
    await renderUserTable();
  } catch(e) {
    console.error('[removeUser]', e);
    alert('Could not remove user. Please try again.');
  }
}

function openInviteModal()  { document.getElementById('invite-modal').style.display = 'flex'; }
function closeInviteModal() {
  document.getElementById('invite-modal').style.display = 'none';
  ['inv-name','inv-email','inv-dept'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inv-role').value = 'member';
}

async function submitInvite() {
  const name  = document.getElementById('inv-name').value.trim().slice(0, 100);
  const email = document.getElementById('inv-email').value.trim().toLowerCase();
  const dept  = document.getElementById('inv-dept').value.trim().slice(0, 100);
  const role  = document.getElementById('inv-role').value;

  if (!name)                    { alert('Full name is required.'); return; }
  if (!window.isValidEmail(email)) { alert('Please enter a valid email address.'); return; }

  const btn = document.getElementById('inv-submit');
  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    const parts = name.split(/\s+/);
    const oi    = ((parts[0]?.[0] || '') + (parts[1]?.[0] || parts[0]?.[1] || '')).toUpperCase();
    await window.inviteUser({ name, email, department: dept, user_role: role, status: 'pending', oi });
    const { error } = await window.sendMagicLink(email);
    if (error) throw error;
    closeInviteModal();
    await renderUserTable();
    alert(`Invite sent to ${email}. They will receive a magic-link email.`);
  } catch(e) {
    console.error('[submitInvite]', e);
    alert('Could not send invite. Please check the details and try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Invite';
  }
}
</script>
</body>
</html>
