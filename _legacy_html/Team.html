<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aktivacity — Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .toolbar{display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap}
  .toolbar .search{position:relative; flex:1; min-width:240px; max-width:420px}
  .toolbar .search input{
    width:100%; border:1px solid var(--border); background:rgba(255,255,255,0.04);
    border-radius:12px; padding:12px 14px 12px 42px;
    font-size:14px; color:var(--text); font-family:inherit;
    outline:none; transition:border-color .15s;
  }
  .toolbar .search input:focus{border-color:var(--primary)}
  .toolbar .search .s-icon{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted-2)}
  
  .team-summary{
    display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;
  }
  .mini-kpi{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; box-shadow:var(--shadow-md)}
  .mini-kpi .lbl{font-size:12px; color:var(--muted); font-weight:500}
  .mini-kpi .val{font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700; letter-spacing:-0.02em; margin-top:4px; font-variant-numeric:tabular-nums}
  .mini-kpi .cap{font-size:12px; color:var(--muted); margin-top:8px}

  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}

  .person-card{
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    box-shadow:var(--shadow-md); overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .2s, border-color .2s;
  }
  .person-card:hover{transform:translateY(-4px); border-color:var(--border-strong)}
  .pc-top{
    padding:24px; display:flex; align-items:center; gap:16px;
    border-bottom:1px solid var(--border);
    position:relative;
  }
  .pc-top .avatar{width:60px; height:60px; font-size:20px; flex-basis:60px}
  .pc-top .name{font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700; letter-spacing:-0.01em; line-height:1.2; color:var(--text)}
  .pc-top .role{font-size:13px; color:var(--muted); margin-top:3px}
  .pc-top .email{font-size:12px; color:var(--muted-2); margin-top:6px; display:flex; align-items:center; gap:6px}
  .pc-top .more{position:absolute; top:18px; right:18px; background:none; border:0; color:var(--muted-2); cursor:pointer; padding:6px; border-radius:8px}
  .pc-top .more:hover{color:var(--text); background:rgba(255,255,255,0.05)}

  .pc-status{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; color:var(--muted);
    padding:4px 10px; border-radius:999px;
    background:rgba(255,255,255,0.05);
    position:absolute; top:18px; right:54px;
    text-transform:uppercase; letter-spacing:.05em;
  }
  .pc-status.red{background:var(--danger-50); color:var(--danger)}
  .pc-status.green{background:var(--success-50); color:var(--success)}
  .pc-status .sw{width:6px; height:6px; border-radius:50%; background:currentColor}

  .pc-stats{
    display:grid; grid-template-columns:repeat(3,1fr);
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,0.01);
  }
  .pc-stats .cell{
    padding:16px 20px;
    border-left:1px solid var(--border);
    display:flex; flex-direction:column; gap:2px;
  }
  .pc-stats .cell:first-child{border-left:0}
  .pc-stats .num{font-family:'Space Grotesk',sans-serif; font-size:24px; font-weight:700; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; color:var(--text)}
  .pc-stats .num.red{color:var(--danger)}
  .pc-stats .num.green{color:var(--success)}
  .pc-stats .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-weight:700}

  .pc-load{
    padding:20px 24px 18px;
    border-bottom:1px solid var(--border);
  }
  .pc-load .lhead{display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:10px}
  .pc-load .lhead b{color:var(--text); font-weight:700}
  .wbar{height:12px; background:rgba(255,255,255,0.05); border-radius:6px; overflow:hidden; display:flex}
  .wbar .seg{height:100%}
  .wbar .seg.red{background:var(--danger)}
  .wbar .seg.green{background:var(--success)}
  .wbar .seg.amber{background:var(--warning)}

  .pc-recent{padding:18px 24px 20px}
  .pc-recent h4{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted-2); font-weight:700; margin:0 0 10px}
  .pc-recent .tsk{display:flex; align-items:center; gap:10px; padding:8px 0; font-size:13px; color:var(--text)}
  .pc-recent .tsk .dot{width:6px; height:6px; border-radius:50%; flex:0 0 6px}
  .pc-recent .tsk .dot.red{background:var(--danger)}
  .pc-recent .tsk .dot.green{background:var(--success)}
  .pc-recent .tsk .title{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .pc-recent .tsk .date{font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap}

  .pc-foot{
    margin-top:auto;
    padding:16px 20px;
    display:flex; gap:10px; border-top:1px solid var(--border);
    background:rgba(255,255,255,0.02);
  }
  .pc-foot .btn{flex:1; justify-content:center}

  /* Invite card */
  .invite-card{
    background:
      radial-gradient(120% 100% at 50% 0%, rgba(99, 102, 241, 0.1), transparent 70%),
      var(--surface);
    border:2px dashed var(--border-strong);
    border-radius:20px;
    padding:32px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    min-height:380px;
    gap:12px;
  }
  .invite-card .ic{
    width:56px; height:56px; border-radius:16px;
    background:var(--primary-50); color:var(--primary);
    display:grid; place-items:center;
  }
  .invite-card h3{font-family:'Space Grotesk',sans-serif; font-size:18px; margin:8px 0 0; letter-spacing:-0.01em; color:var(--text)}
  .invite-card p{margin:0; font-size:14px; color:var(--muted); max-width:240px}

  .pc-info { flex: 1; min-width: 0; }
  .no-tasks { font-size: 12.5px; color: var(--muted-2); padding: 4px 0; }
  .load-danger { color: var(--danger); }
  .load-success { color: var(--success); }
  .ml-auto-flex { margin-left: auto; display: flex; gap: 8px; }
  .text-danger { color: var(--danger); }
  .text-success { color: var(--success); }
  .flex-1-min-0 { flex: 1; min-width: 0; }
  .empty-assigned { font-size: 12.5px; color: var(--muted-2); padding: 4px 0; }
  .mt-8 { margin-top: 8px; }

  @media (max-width: 1100px){ .grid{grid-template-columns:repeat(2,1fr)} .team-summary{grid-template-columns:repeat(2,1fr)} }
  @media (max-width: 640px){ .grid{grid-template-columns:1fr} .team-summary{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="icons"></div>

<div class="app">
  <div id="sidebar-slot"></div>
  <main class="main">
    <div id="topbar-slot"></div>
    <div class="content">

      <div class="toolbar">
        <div class="search">
          <svg class="s-icon" width="16" height="16"><use href="#i-search"/></svg>
          <input placeholder="Search people, roles, skills…"/>
        </div>
        <div class="seg"><button class="on">All</button><button>Designers</button><button>Leads</button></div>
        <div class="ml-auto-flex">
          <button class="btn btn-ghost"><svg class="icon"><use href="#i-filter"/></svg> Filter</button>
          <a class="btn btn-primary" href="Settings.html"><svg class="icon"><use href="#i-plus"/></svg> Invite member</a>
        </div>
      </div>

      <div class="team-summary">
        <div class="mini-kpi">
          <div class="lbl">Team size</div>
          <div class="val">6</div>
          <div class="cap">All active, Design dept.</div>
        </div>
        <div class="mini-kpi">
          <div class="lbl">Avg. open tasks / person</div>
          <div class="val">1.5</div>
          <div class="cap">9 overdue spread across 6 people</div>
        </div>
        <div class="mini-kpi">
          <div class="lbl">Highest load</div>
          <div class="val text-danger">Zainab · 2</div>
          <div class="cap">Both currently overdue</div>
        </div>
        <div class="mini-kpi">
          <div class="lbl">Completed this week</div>
          <div class="val text-success">3</div>
          <div class="cap">Moiz · Inam · Sibghat</div>
        </div>
      </div>

      <div class="section-head">
        <div>
          <h2 class="display">Roster</h2>
          <p>Workload and overdue visibility per person. Click a card to open their profile.</p>
        </div>
        <div class="seg"><button class="on">Cards</button><button>Table</button></div>
      </div>

      <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="sidebar.js"></script>
<script src="logic.js"></script>
<script>
  fetch('icons.html').then(r=>r.text()).then(t=>document.getElementById('icons').innerHTML=t).then(init).catch(init);

  async function init(){
    await window.authReady;
    if ((window.CURRENT_USER || {}).user_role === 'member') {
      window.location.href = 'Production Tasks.html';
      return;
    }
    document.getElementById('sidebar-slot').outerHTML = renderSidebar('team');
    document.getElementById('topbar-slot').outerHTML = renderTopbar('Team','Six designers across production. Balance load, surface overdue risk.');

    if (window.OWNERS.length === 0) {
        await initializeDashboardData();
    }

    
    // Search handler
    const sInput = document.querySelector('.search input');
    sInput.addEventListener('input', debounce((e) => {
      FilterState.search = e.target.value;
      renderGrid();
    }));

    renderGrid();
  }

  function personCard(o){
    const their = TASKS.filter(t => t.oi === o.id);
    const overdue = their.filter(t => t.status==='overdue').length;
    const completed = their.filter(t => t.status==='completed').length;
    const total = their.length;
    const maxLoad = 3;
    const loadPct = Math.min(100, (total/maxLoad)*100);
    const overPct = total ? (overdue/total)*loadPct : 0;
    const compPct = total ? (completed/total)*loadPct : 0;
    const statusCls = overdue>0 ? 'red' : (total===0?'green':'');
    const statusTxt = overdue>0 ? `${overdue} overdue` : (total===0?'Available':'On track');
    const recent = their.slice(0,3).map(t => `
      <div class="tsk">
        <span class="dot ${t.status==='overdue'?'red':'green'}"></span>
        <span class="title">${esc(t.title)}</span>
        <span class="date">17 Apr</span>
      </div>
    `).join('');
    return `
      <article class="person-card">
        <div class="pc-top">
          <div class="avatar" style="background:${OWNER_COLORS[o.id]}">${esc(o.id)}</div>
          <div class="flex-1-min-0">
            <div class="name">${esc(o.name)}</div>
            <div class="role">${esc(o.role)}</div>
            <div class="email"><svg width="11" height="11"><use href="#i-mail"/></svg> ${esc(o.email || '')}</div>
          </div>
          <span class="pc-status ${statusCls}"><span class="sw"></span> ${esc(statusTxt)}</span>
          <button class="more"><svg width="16" height="16"><use href="#i-more"/></svg></button>
        </div>
        <div class="pc-stats">
          <div class="cell"><span class="num">${total}</span><span class="lbl">Assigned</span></div>
          <div class="cell"><span class="num red">${overdue}</span><span class="lbl">Overdue</span></div>
          <div class="cell"><span class="num green">${completed}</span><span class="lbl">Done</span></div>
        </div>
        <div class="pc-load">
          <div class="lhead"><span>Current load</span><span><b>${total}</b> of ${maxLoad} slots</span></div>
          <div class="wbar">
            ${overdue?`<div class="seg red" style="width:${overPct}%"></div>`:''}
            ${completed?`<div class="seg green" style="width:${compPct}%"></div>`:''}
          </div>
        </div>
        <div class="pc-recent">
          <h4>Current tasks</h4>
          ${recent || '<div class="empty-assigned">Nothing assigned.</div>'}
        </div>
        <div class="pc-foot">
          <button class="btn btn-ghost btn-sm"><svg class="icon"><use href="#i-mail"/></svg> Message</button>
          <button class="btn btn-ghost btn-sm"><svg class="icon"><use href="#i-plus"/></svg> Assign task</button>
        </div>
      </article>
    `;
  }

  function renderGrid(){
    const cards = OWNERS.map(personCard).join('');
    const invite = `
      <div class="invite-card">
        <div class="ic"><svg width="22" height="22"><use href="#i-plus"/></svg></div>
        <h3>Invite a new member</h3>
        <p>Send an invite link to add designers, writers, or freelancers to Aktivacity.</p>
        <button class="btn btn-primary btn-sm mt-8">
          <svg class="icon"><use href="#i-mail"/></svg> Send invite
        </button>
      </div>
    `;
    document.getElementById('grid').innerHTML = cards + invite;
  }
</script>
</body>
</html>
